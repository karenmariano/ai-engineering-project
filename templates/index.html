<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy RAG</title>
    <style>
      :root { font-family: system-ui, sans-serif; line-height: 1.4; }
      body { max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
      textarea { width: 100%; min-height: 4.5rem; }
      .row { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
      button { padding: 0.4rem 0.8rem; cursor: pointer; }
      pre { white-space: pre-wrap; background: #f4f4f4; padding: 1rem; border-radius: 6px; }
      .citation { font-size: 0.9rem; color: #333; border-left: 3px solid #06c; padding-left: 0.5rem; margin: 0.4rem 0; }
    </style>
  </head>
  <body>
    <h1>Company policy Q&amp;A</h1>
    <p>Ask a question. Answers use only the indexed policy corpus; citations are returned for traceability.</p>
    <label for="q">Your question</label>
    <textarea id="q" placeholder="e.g. How do I report a security incident?"></textarea>
    <div class="row">
      <button type="button" id="send">Ask</button>
    </div>
    <h2>Response</h2>
    <pre id="out">(no response yet)</pre>
    <div id="cits"></div>
    <script>
      const out = document.getElementById("out");
      const cits = document.getElementById("cits");
      document.getElementById("send").addEventListener("click", async () => {
        const question = document.getElementById("q").value.trim();
        if (!question) return;
        out.textContent = "Loading…";
        cits.innerHTML = "";
        const r = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await r.json();
        if (!r.ok) {
          out.textContent = JSON.stringify(data, null, 2);
          return;
        }
        out.textContent = (data.answer || "");
        (data.citations || []).forEach((c) => {
          const d = document.createElement("div");
          d.className = "citation";
          d.textContent = `${c.doc_title} — ${c.section_heading} (${c.chunk_id})`;
          cits.appendChild(d);
        });
      });
    </script>
  </body>
</html>
