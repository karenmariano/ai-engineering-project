# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect this Git repo.
services:
  - type: web
    name: policy-rag
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt
      test -f data/corpus/chunks/chunks.jsonl
      python scripts/ingest.py --force
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300 "src.app:create_app()"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: EMBEDDING_MODEL
        value: default
      # Secrets: set values only in the Render Dashboard (do not commit).
      - key: LLM_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
